<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - NMIMS Carpool</title>
  <link rel="stylesheet" href="public/styles.css" />
</head>
<body>
  <nav class="nav">
    <div class="logo">NMIMS Community Carpool</div>
    <div class="nav-right">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <main class="container">
    <section class="card form-wrap">
      <h1 class="section-title">Create your account</h1>
      <p id="message" class="msg hidden"></p>
      <form id="registerForm" class="form-grid">
        <label>Full Name <input type="text" name="fullName" required autocomplete="name" /></label>
        <label>Email <input type="email" name="email" required placeholder="you@gmail.com or you@nmims.in" autocomplete="email" /></label>
        <label>Password <input type="password" name="password" minlength="6" required autocomplete="new-password" /></label>
        <label>User Type
          <select name="userType" required>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </label>
        <label>City
          <select name="city" required>
            <option>Chandigarh</option>
            <option>Panchkula</option>
            <option>Zirakpur</option>
          </select>
        </label>
        <button type="submit">Create Account</button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
